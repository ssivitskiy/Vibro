name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 python/ tests/ --max-line-length=120 --ignore=E402,W503

      - name: Run tests
        run: |
          cd python && python -m pytest ../tests/ -v --tb=short

      - name: Test synthetic training pipeline
        run: |
          cd python
          python train.py --synthetic
          python export_model.py
          test -f ../web/model/rf_model.json
          test -f ../web/model/meta.json
          echo "✓ Full pipeline passed"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          # Basic HTML validation
          python3 -c "
          from html.parser import HTMLParser
          class V(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.errors = []
              def handle_starttag(self, tag, attrs): pass
          v = V()
          with open('web/index.html') as f:
              v.feed(f.read())
          print('✓ HTML parsed OK')
          "

      - name: Check JS syntax
        run: |
          # Verify all JS files parse without errors
          for f in web/js/*.js; do
            node --check "$f" && echo "✓ $f" || exit 1
          done
