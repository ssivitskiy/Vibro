services:
  web:
    ports: []
    expose:
      - "8000"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      VIBRO_DOMAIN: "${VIBRO_DOMAIN:?set VIBRO_DOMAIN in .env}"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
